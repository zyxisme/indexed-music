<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线音乐播放器</title>
    <style>
        /* ===== CSS Variables System ===== */
        :root {
            /* Background colors */
            --bg-base: #121212;
            --bg-surface: #181818;
            --bg-elevated: #1f1f1f;

            /* Accent colors */
            --accent-green: #1ed760;
            --accent-green-hover: #1db954;

            /* Text colors */
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-subdued: #6a6a6a;

            /* Semantic colors */
            --text-negative: #f3727f;
            --text-warning: #ffa42b;

            /* Spacing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;

            /* Border radius */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-pill: 9999px;
            --radius-circle: 50%;

            /* Shadows */
            --shadow-heavy: rgba(0,0,0,0.5) 0px 8px 24px;
            --shadow-medium: rgba(0,0,0,0.3) 0px 8px 8px;
        }

        /* ===== Base Styles Reset ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== Button Components ===== */

        /* Pill button */
        .btn-pill {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: none;
            border-radius: var(--radius-pill);
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-pill:hover {
            background: #2a2a2a;
        }

        /* Play button */
        .btn-play {
            background: var(--accent-green);
            color: #000000;
            border: none;
            border-radius: var(--radius-circle);
            width: 56px;
            height: 56px;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-play:hover {
            background: var(--accent-green-hover);
            transform: scale(1.05);
        }

        /* Small button */
        .btn-small {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid #4d4d4d;
            border-radius: var(--radius-pill);
            padding: var(--spacing-xs) var(--spacing-md);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-small:hover {
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        /* ===== Input Components ===== */

        .input-pill {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: none;
            border-radius: 500px;
            padding: 12px var(--spacing-lg);
            font-size: 14px;
            outline: none;
            transition: background 0.2s;
            width: 100%;
        }

        .input-pill:focus {
            background: #2a2a2a;
            box-shadow: 0 0 0 2px var(--text-primary);
        }

        .input-pill::placeholder {
            color: var(--text-subdued);
        }

        /* ===== Card and List Components ===== */

        /* Music card */
        .music-card {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            transition: background 0.2s;
        }

        .music-card:hover {
            background: #282828;
        }

        /* List item */
        .list-item {
            display: flex;
            align-items: center;
            padding: 12px var(--spacing-md);
            border-radius: var(--radius-sm);
            transition: background 0.2s;
            cursor: pointer;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .list-item.active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ===== Layout Components ===== */

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .card {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-bottom: 20px;
            box-shadow: var(--shadow-medium);
        }

        .card h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid var(--accent-green);
            padding-bottom: 10px;
        }

        /* ===== URL Input Group ===== */

        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .url-input-group input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            background: var(--bg-elevated);
            color: var(--text-primary);
            outline: none;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .url-input-group input:focus {
            background: #2a2a2a;
            box-shadow: 0 0 0 2px var(--text-primary);
        }

        .url-input-group input::placeholder {
            color: var(--text-subdued);
        }

        /* ===== Button Variants ===== */

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1.4px;
        }

        .btn-primary {
            background: var(--accent-green);
            color: #000000;
        }

        .btn-primary:hover {
            background: var(--accent-green-hover);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--accent-green);
            color: #000000;
        }

        .btn-success:hover {
            background: var(--accent-green-hover);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--text-negative);
            color: var(--text-primary);
        }

        .btn-danger:hover {
            background: #e55a67;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== Upload Area ===== */

        .upload-area {
            border: 2px dashed var(--text-subdued);
            border-radius: var(--radius-md);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-elevated);
        }

        .upload-area:hover {
            background: #2a2a2a;
            border-color: var(--text-secondary);
        }

        .upload-area.dragover {
            background: #2a2a2a;
            border-color: var(--accent-green);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .upload-text {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .upload-hint {
            color: var(--text-subdued);
            font-size: 13px;
            margin-top: 10px;
        }

        #fileInput {
            display: none;
        }

        /* ===== Player Section ===== */

        .player-section {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .player-section h2 {
            color: var(--text-primary);
            border-bottom-color: rgba(255,255,255,0.3);
        }

        .now-playing {
            text-align: center;
            margin-bottom: 20px;
        }

        .now-playing-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .now-playing-artist {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 50px;
            height: 50px;
            border-radius: var(--radius-circle);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            color: var(--text-primary);
            transform: scale(1.1);
        }

        .control-btn.play-btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
            background: var(--accent-green);
            color: #000000;
        }

        .control-btn.play-btn:hover {
            background: var(--accent-green-hover);
            transform: scale(1.05);
        }

        /* ===== Progress Bar ===== */

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-sm);
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-green);
            border-radius: var(--radius-sm);
            width: 0%;
            transition: width 0.1s;
        }

        .progress-bar:hover .progress-fill {
            background: var(--accent-green-hover);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ===== Volume Control ===== */

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .volume-slider {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-sm);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--text-primary);
            border-radius: var(--radius-circle);
            cursor: pointer;
        }

        /* ===== Music List ===== */

        .music-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .music-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
            cursor: pointer;
        }

        .music-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .music-item.active {
            background: rgba(255, 255, 255, 0.1);
        }

        .music-item-icon {
            font-size: 24px;
            margin-right: 15px;
            color: var(--text-secondary);
        }

        .music-item-info {
            flex: 1;
        }

        .music-item-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .music-item-size {
            font-size: 12px;
            color: var(--text-subdued);
        }

        .music-item-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: 1px solid var(--text-subdued);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: var(--radius-pill);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--text-primary);
            color: var(--bg-base);
            border-color: var(--text-primary);
        }

        .action-btn.delete:hover {
            background: var(--text-negative);
            border-color: var(--text-negative);
            color: var(--text-primary);
        }

        /* ===== Empty State ===== */

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-subdued);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        /* ===== Loading State ===== */

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid var(--bg-elevated);
            border-top: 3px solid var(--accent-green);
            border-radius: var(--radius-circle);
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== Notification ===== */

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-heavy);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--accent-green);
            color: #000000;
        }

        .notification.error {
            background: var(--text-negative);
            color: var(--text-primary);
        }

        /* ===== Responsive Design ===== */

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .url-input-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .player-controls {
                gap: 15px;
            }

            .control-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .control-btn.play-btn {
                width: 55px;
                height: 55px;
                font-size: 22px;
            }
        }

        /* ===== Scrollbar Styling ===== */

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-subdued);
            border-radius: var(--radius-pill);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ===== Spotify Layout: Navbar ===== */

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-sm) var(--spacing-lg);
            background: var(--bg-surface);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            height: 64px;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .logo-icon {
            font-size: 24px;
            color: var(--accent-green);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .navbar-links {
            display: flex;
            gap: var(--spacing-lg);
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-pill);
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link.active {
            color: var(--text-primary);
        }

        /* ===== Spotify Layout: Main Content ===== */

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-lg);
        }

        .content-header {
            display: flex;
            align-items: baseline;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .content-header h1 {
            font-size: 2em;
            font-weight: 700;
            margin: 0;
            text-align: left;
        }

        .music-count {
            font-size: 1em;
            color: var(--text-secondary);
        }

        /* ===== Spotify Layout: Player Bar ===== */

        .player-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-sm) var(--spacing-lg);
            background: var(--bg-surface);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            height: 90px;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-info-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-info-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-xs);
            flex: 2;
        }

        .controls-buttons {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .btn-control {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .btn-control:hover {
            color: var(--text-primary);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            width: 100%;
            max-width: 600px;
        }

        .time-current,
        .time-duration {
            font-size: 11px;
            color: var(--text-subdued);
            min-width: 36px;
            text-align: center;
        }

        .player-volume {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: var(--spacing-sm);
        }

        .volume-icon {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* ===== Spotify Layout: Modal ===== */

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            width: 90%;
            max-width: 480px;
            box-shadow: var(--shadow-heavy);
            position: relative;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-lg);
        }

        .modal-header h2 {
            font-size: 1.5em;
            font-weight: 700;
            margin: 0;
        }

        .btn-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: var(--spacing-xs);
            transition: color 0.2s;
        }

        .btn-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .input-with-btn {
            display: flex;
            gap: var(--spacing-sm);
        }

        .input-with-btn .input-pill {
            flex: 1;
        }

        .btn-paste {
            background: var(--bg-surface);
            color: var(--text-secondary);
            border: none;
            border-radius: var(--radius-pill);
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-paste:hover {
            background: #2a2a2a;
            color: var(--text-primary);
        }

        .divider {
            text-align: center;
            color: var(--text-subdued);
            font-size: 13px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        /* ===== Empty State (updated) ===== */

        .empty-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            color: var(--text-secondary);
        }

        .empty-text {
            color: var(--text-subdued);
        }

        /* ===== Task 3: Layout Styles (Brief) ===== */

        /* Navbar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-lg);
            height: 64px;
            background-color: var(--bg-surface);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .logo-icon {
            font-size: 24px;
            color: var(--accent-green);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
        }

        .navbar-links {
            display: flex;
            gap: var(--spacing-lg);
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: color 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text-primary);
        }

        /* Main Content Area */
        .main-content {
            margin-top: 64px;
            margin-bottom: 90px;
            padding: var(--spacing-lg);
            min-height: calc(100vh - 64px - 90px);
        }

        .content-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .content-header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .music-count {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .music-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            color: var(--text-subdued);
        }

        .empty-text {
            font-size: 16px;
        }

        /* Player Bar */
        .player-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-lg);
            height: 90px;
            background-color: var(--bg-surface);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-info-title {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-info-artist {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .player-controls {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .controls-buttons {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .btn-control {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-control:hover {
            color: var(--text-primary);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            width: 100%;
            max-width: 600px;
        }

        .time-current,
        .time-duration {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 40px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-green);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }

        .player-volume {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: var(--spacing-sm);
        }

        .volume-icon {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: var(--text-primary);
            border-radius: var(--radius-circle);
            cursor: pointer;
        }

        /* ===== Task 4: Modal and Notification Styles (Brief) ===== */

        /* Step 1: Modal base styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-heavy);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-lg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: var(--spacing-lg);
        }

        /* Step 2: Modal inner component styles */
        .input-group {
            margin-bottom: var(--spacing-lg);
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }

        .input-with-btn {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
        }

        .input-with-btn .input-pill {
            flex: 1;
        }

        .btn-paste {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: none;
            border-radius: var(--radius-circle);
            width: 44px;
            height: 44px;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-paste:hover {
            color: var(--text-primary);
            background: #2a2a2a;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin: var(--spacing-lg) 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Step 3: Upload area styles */
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-md);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: var(--accent-green);
            background: rgba(30, 215, 96, 0.05);
        }

        .upload-area.dragover {
            border-color: var(--accent-green);
            background: rgba(30, 215, 96, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            color: var(--text-subdued);
        }

        .upload-text {
            font-size: 16px;
            margin-bottom: var(--spacing-sm);
        }

        .upload-hint {
            font-size: 13px;
            color: var(--text-secondary);
        }

        #fileInput {
            display: none;
        }

        /* Step 4: Loading and notification styles */
        .loading {
            display: none;
            text-align: center;
            padding: var(--spacing-lg);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent-green);
            border-radius: var(--radius-circle);
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--spacing-sm);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 12px 20px;
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-medium);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 300;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left: 4px solid var(--accent-green);
        }

        .notification.error {
            border-left: 4px solid var(--text-negative);
        }
    </style>
</head>
<body>
    <!-- Top Navbar -->
    <nav class="navbar">
        <div class="navbar-logo">
            <span class="logo-icon">♪</span>
            <span class="logo-text">离线音乐播放器</span>
        </div>
        <div class="navbar-links">
            <a href="#" class="nav-link active">首页</a>
            <a href="#" class="nav-link">音乐库</a>
        </div>
        <button class="btn-pill" id="addMusicBtn">添加音乐</button>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="content-header">
            <h1>音乐库</h1>
            <span class="music-count" id="musicCount">(0)</span>
        </div>

        <div class="music-list" id="musicList">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">♪</div>
                <div class="empty-text">还没有音乐，快去添加吧！</div>
            </div>
        </div>
    </main>

    <!-- Bottom Player Bar -->
    <footer class="player-bar">
        <div class="player-info">
            <div class="player-info-title" id="nowPlayingTitle">未选择音乐</div>
            <div class="player-info-artist" id="nowPlayingArtist">从列表中选择一首音乐开始播放</div>
        </div>

        <div class="player-controls">
            <div class="controls-buttons">
                <button class="btn-control" onclick="playPrevious()" title="上一首">
                    <span class="icon-prev">⏮</span>
                </button>
                <button class="btn-play" id="playBtn" onclick="togglePlay()" title="播放/暂停">
                    <span class="icon-play">▶</span>
                </button>
                <button class="btn-control" onclick="playNext()" title="下一首">
                    <span class="icon-next">⏭</span>
                </button>
            </div>

            <div class="progress-container">
                <span class="time-current" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time-duration" id="duration">0:00</span>
            </div>
        </div>

        <div class="player-volume">
            <span class="volume-icon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="changeVolume(this.value)">
        </div>
    </footer>

    <!-- Add Music Modal -->
    <div class="modal-overlay" id="addMusicModal">
        <div class="modal">
            <div class="modal-header">
                <h2>添加音乐</h2>
                <button class="btn-close" onclick="closeModal()">X</button>
            </div>

            <div class="modal-body">
                <div class="input-group">
                    <label>从 URL 下载</label>
                    <div class="input-with-btn">
                        <input type="text" class="input-pill" id="musicUrl" placeholder="输入音乐 URL 地址...">
                        <button class="btn-paste" onclick="pasteFromClipboard()" title="粘贴">⎮⎮</button>
                    </div>
                    <button class="btn-pill" onclick="downloadFromUrl()">下载</button>
                </div>

                <div class="divider">或者</div>

                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">↑</div>
                    <div class="upload-text">点击或拖拽音乐文件到这里</div>
                    <div class="upload-hint">支持 MP3, WAV, OGG, FLAC 等格式</div>
                    <input type="file" id="fileInput" accept="audio/*" multiple>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>正在处理...</div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer"></audio>

    <script>
        // IndexedDB configuration
        const DB_NAME = 'MusicPlayerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'music';

        // Global variables
        let db = null;
        let audioPlayer = document.getElementById('audioPlayer');
        let currentMusicId = null;
        let musicList = [];
        let currentIndex = -1;

        // Initialize IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => {
                    reject(request.error);
                };

                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('name', 'name', { unique: false });
                        store.createIndex('addedAt', 'addedAt', { unique: false });
                    }
                };
            });
        }

        // Save music to IndexedDB
        async function saveMusic(name, data, type) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);

                const music = {
                    name: name,
                    data: data,
                    type: type,
                    size: data.byteLength || data.size,
                    addedAt: new Date().getTime()
                };

                const request = store.add(music);

                request.onsuccess = () => {
                    resolve(request.result);
                };

                request.onerror = () => {
                    reject(request.error);
                };
            });
        }

        // Get all music from IndexedDB
        async function getAllMusic() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();

                request.onsuccess = () => {
                    resolve(request.result);
                };

                request.onerror = () => {
                    reject(request.error);
                };
            });
        }

        // Get single music from IndexedDB
        async function getMusic(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(id);

                request.onsuccess = () => {
                    resolve(request.result);
                };

                request.onerror = () => {
                    reject(request.error);
                };
            });
        }

        // Delete music from IndexedDB
        async function deleteMusic(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(id);

                request.onsuccess = () => {
                    resolve();
                };

                request.onerror = () => {
                    reject(request.error);
                };
            });
        }

        // ===== Playback Control Functions (Task 6) =====

        // Play music by ID
        async function playMusic(id, index) {
            try {
                const music = await getMusic(id);
                if (!music) {
                    showNotification('音乐不存在', 'error');
                    return;
                }

                // Release previous blob URL to prevent memory leak
                if (audioPlayer.src && audioPlayer.src.startsWith('blob:')) {
                    URL.revokeObjectURL(audioPlayer.src);
                }

                const blob = new Blob([music.data], { type: music.type });
                const url = URL.createObjectURL(blob);

                audioPlayer.src = url;
                audioPlayer.play().catch(err => {
                    console.warn('Autoplay blocked:', err);
                    showNotification('请点击播放按钮开始播放', 'error');
                });

                currentMusicId = id;
                currentIndex = index;

                const nowPlayingTitle = document.getElementById('nowPlayingTitle');
                const nowPlayingArtist = document.getElementById('nowPlayingArtist');
                const playBtn = document.getElementById('playBtn');

                if (nowPlayingTitle) nowPlayingTitle.textContent = music.name;
                if (nowPlayingArtist) nowPlayingArtist.textContent = '正在播放';
                if (playBtn) playBtn.innerHTML = '<span class="icon-pause">⏸</span>';

                await refreshMusicList();
            } catch (error) {
                console.error('播放错误:', error);
                showNotification('播放失败: ' + error.message, 'error');
            }
        }

        // Toggle play/pause
        function togglePlay() {
            if (!audioPlayer.src) {
                if (musicList.length > 0) {
                    playMusic(musicList[0].id, 0);
                }
                return;
            }

            const playBtn = document.getElementById('playBtn');
            if (audioPlayer.paused) {
                audioPlayer.play();
                if (playBtn) playBtn.innerHTML = '<span class="icon-pause">⏸</span>';
            } else {
                audioPlayer.pause();
                if (playBtn) playBtn.innerHTML = '<span class="icon-play">▶</span>';
            }
        }

        // Play previous track
        function playPrevious() {
            if (musicList.length === 0) return;

            let newIndex = currentIndex - 1;
            if (newIndex < 0) {
                newIndex = musicList.length - 1;
            }

            playMusic(musicList[newIndex].id, newIndex);
        }

        // Play next track
        function playNext() {
            if (musicList.length === 0) return;

            let newIndex = currentIndex + 1;
            if (newIndex >= musicList.length) {
                newIndex = 0;
            }

            playMusic(musicList[newIndex].id, newIndex);
        }

        // Seek to position
        function seek(event) {
            const progressBar = document.getElementById('progressBar');
            if (!progressBar || !audioPlayer.duration) return;

            const rect = progressBar.getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
            audioPlayer.currentTime = percent * audioPlayer.duration;
        }

        // Change volume
        function changeVolume(value) {
            audioPlayer.volume = value / 100;
        }

        // Format time (seconds to mm:ss)
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';

            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        // ===== Music Management Functions (Task 7) =====

        // Refresh music list UI
        async function refreshMusicList() {
            musicList = await getAllMusic();
            musicList.sort((a, b) => b.addedAt - a.addedAt);

            const listContainer = document.getElementById('musicList');
            const musicCount = document.getElementById('musicCount');

            if (musicCount) {
                musicCount.textContent = `(${musicList.length})`;
            }

            if (!listContainer) return;

            if (musicList.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">♪</div>
                        <div class="empty-text">还没有音乐，快去添加吧！</div>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = musicList.map((music, index) => `
                <div class="list-item ${currentMusicId === music.id ? 'active' : ''}"
                     onclick="playMusic(${music.id}, ${index})">
                    <div class="item-icon">♪</div>
                    <div class="item-info">
                        <div class="item-name">${escapeHtml(music.name)}</div>
                        <div class="item-size">${formatSize(music.size)}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-small delete" onclick="event.stopPropagation(); removeMusic(${music.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // Remove music by ID
        async function removeMusic(id) {
            if (!confirm('确定要删除这首音乐吗？')) {
                return;
            }

            try {
                await deleteMusic(id);

                if (currentMusicId === id) {
                    audioPlayer.pause();
                    audioPlayer.src = '';
                    currentMusicId = null;
                    currentIndex = -1;

                    const nowPlayingTitle = document.getElementById('nowPlayingTitle');
                    const nowPlayingArtist = document.getElementById('nowPlayingArtist');
                    const playBtn = document.getElementById('playBtn');

                    if (nowPlayingTitle) nowPlayingTitle.textContent = '未选择音乐';
                    if (nowPlayingArtist) nowPlayingArtist.textContent = '从列表中选择一首音乐开始播放';
                    if (playBtn) playBtn.innerHTML = '<span class="icon-play">▶</span>';
                }

                showNotification('音乐已删除', 'success');
                await refreshMusicList();
            } catch (error) {
                console.error('删除错误:', error);
                showNotification('删除失败: ' + error.message, 'error');
            }
        }

        // Handle file upload
        async function handleFileUpload(files) {
            showLoading(true);

            try {
                for (const file of files) {
                    const arrayBuffer = await file.arrayBuffer();
                    await saveMusic(file.name, arrayBuffer, file.type);
                }

                showNotification(`成功添加 ${files.length} 首音乐！`, 'success');
                await refreshMusicList();
            } catch (error) {
                console.error('上传错误:', error);
                showNotification('上传失败: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Download music from URL
        async function downloadFromUrl() {
            const urlInput = document.getElementById('musicUrl');
            if (!urlInput) return;
            const url = urlInput.value.trim();

            if (!url) {
                showNotification('请输入音乐URL', 'error');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('下载失败');
                }

                const blob = await response.blob();
                const fileName = getFileNameFromUrl(url) || 'unknown.mp3';
                const arrayBuffer = await blob.arrayBuffer();

                await saveMusic(fileName, arrayBuffer, blob.type);
                urlInput.value = '';

                showNotification('音乐下载成功！', 'success');
                await refreshMusicList();
            } catch (error) {
                console.error('下载错误:', error);
                showNotification('下载失败: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Get filename from URL
        function getFileNameFromUrl(url) {
            try {
                const urlObj = new URL(url);
                const path = urlObj.pathname;
                const fileName = path.split('/').pop();
                return fileName || null;
            } catch {
                return null;
            }
        }

        // ===== Utility Functions (Task 8) =====

        // Format file size
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Show/hide loading state
        function showLoading(show) {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) {
                loadingEl.classList.toggle('show', show);
            }
        }

        // Show notification
        function showNotification(message, type = '') {
            const notification = document.getElementById('notification');
            if (!notification) return;

            notification.textContent = message;
            notification.className = 'notification ' + type;

            setTimeout(() => {
                notification.classList.add('show');
            }, 10);

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // ===== Dialog Control Functions (Task 8) =====

        // Open add music modal
        function openModal() {
            const modal = document.getElementById('addMusicModal');
            if (modal) {
                modal.classList.add('show');
            }
        }

        // Close add music modal
        function closeModal() {
            const modal = document.getElementById('addMusicModal');
            if (modal) {
                modal.classList.remove('show');
            }
        }

        // Paste from clipboard
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                const urlInput = document.getElementById('musicUrl');
                if (urlInput) {
                    urlInput.value = text;
                }
            } catch (error) {
                console.error('粘贴失败:', error);
                showNotification('无法访问剪贴板', 'error');
            }
        }

        // ===== Event Listeners Initialization (Task 8) =====

        // Initialize event listeners
        function initEventListeners() {
            // Add music button
            const addMusicBtn = document.getElementById('addMusicBtn');
            if (addMusicBtn) {
                addMusicBtn.addEventListener('click', openModal);
            }

            // Modal overlay click to close
            const modalOverlay = document.getElementById('addMusicModal');
            if (modalOverlay) {
                modalOverlay.addEventListener('click', (e) => {
                    if (e.target === modalOverlay) {
                        closeModal();
                    }
                });
            }

            // File upload
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            if (uploadArea && fileInput) {
                uploadArea.addEventListener('click', () => {
                    fileInput.click();
                });

                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        handleFileUpload(e.target.files);
                    }
                });

                // Drag and drop
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.classList.add('dragover');
                });

                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.classList.remove('dragover');
                });

                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('dragover');

                    if (e.dataTransfer.files.length > 0) {
                        handleFileUpload(e.dataTransfer.files);
                    }
                });
            }

            // Audio player events
            audioPlayer.addEventListener('timeupdate', () => {
                const progressFill = document.getElementById('progressFill');
                const currentTimeEl = document.getElementById('currentTime');
                if (progressFill && audioPlayer.duration) {
                    const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                    progressFill.style.width = percent + '%';
                }
                if (currentTimeEl) {
                    currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
                }
            });

            audioPlayer.addEventListener('loadedmetadata', () => {
                const durationEl = document.getElementById('duration');
                if (durationEl) {
                    durationEl.textContent = formatTime(audioPlayer.duration);
                }
            });

            audioPlayer.addEventListener('ended', () => {
                playNext();
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;

                switch(e.code) {
                    case 'Space':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'ArrowLeft':
                        audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 5);
                        break;
                    case 'ArrowRight':
                        if (audioPlayer.duration && !isNaN(audioPlayer.duration)) {
                            audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 5);
                        }
                        break;
                }
            });

            // URL input Enter key
            const musicUrlInput = document.getElementById('musicUrl');
            if (musicUrlInput) {
                musicUrlInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        downloadFromUrl();
                    }
                });
            }
        }

        // ===== Application Initialization (Task 8) =====

        // Initialize application
        async function init() {
            try {
                await initDB();
                initEventListeners();
                await refreshMusicList();
                console.log('音乐播放器初始化完成');
            } catch (error) {
                console.error('初始化错误:', error);
                showNotification('初始化失败: ' + error.message, 'error');
            }
        }

        // Start application
        init();
    </script>
</body>
</html>
